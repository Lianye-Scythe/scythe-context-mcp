name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Benchmark regression gate
        run: node scripts/context-benchmark-gate.mjs

      - name: Smoke CLI
        run: npm run smoke

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check package contents
        run: npm pack --dry-run
